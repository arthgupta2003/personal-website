services:
  claude:
    build:
      context: .
      dockerfile: Dockerfile.claude
    ports:
      - "32352:32352"
      - "8000:8000"
    volumes:
      # Project source — the only thing Claude can touch
      - .:/workspace
      # Prevent Claude from persisting sessions outside the container
      # (keeps container ephemeral)
    env_file:
      - .env
    environment:
      # OAuth credentials extracted from macOS Keychain
      # Refresh with: security find-generic-password -s "Claude Code-credentials" -w
      - CLAUDE_CREDENTIALS=${CLAUDE_CREDENTIALS}
    # No extra capabilities, no host network, no privileged mode
    security_opt:
      - no-new-privileges:true
    # Memory limit — keeps container lean on 8GB machine
    # Claude CLI + node-pty + claude-code-web need ~200-400MB
    # Raise to 2g if Claude runs out during heavy tasks
    mem_limit: 1g
    # Restart policy — don't restart if Claude goes rogue
    restart: "no"
