<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Arth Gupta</title>
  <meta name="description" content="Arth Gupta">
  <meta property="og:title" content="Arth Gupta">
  <meta property="og:description" content="">
  <meta property="og:type" content="website">
  <meta property="og:url" content="https://arthgupta.dev">
  <style>
    :root {
      --bg: #fafaf9;
      --fg: #1c1917;
      --muted: #78716c;
      --accent: #c2410c;
      --card-bg: #ffffff;
      --border: #e7e5e4;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1c1917;
        --fg: #fafaf9;
        --muted: #a8a29e;
        --accent: #fb923c;
        --card-bg: #292524;
        --border: #44403c;
      }
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 4rem 1.5rem;
    }

    main {
      max-width: 600px;
      width: 100%;
    }

    h1 {
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 0.25rem;
    }

    .tagline {
      color: var(--muted);
      font-size: 1.1rem;
      margin-bottom: 2.5rem;
    }

    .bio {
      margin-bottom: 2.5rem;
      font-size: 1.05rem;
      color: var(--fg);
    }

    .bio p + p { margin-top: 0.75rem; }

    h2 {
      font-size: 0.85rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--muted);
      margin-bottom: 1rem;
    }

    .projects {
      display: flex;
      flex-direction: column;
      gap: 1rem;
      margin-bottom: 2.5rem;
    }

    .project {
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.25rem;
      background: var(--card-bg);
      text-decoration: none;
      color: inherit;
      transition: border-color 0.15s;
    }

    .project:hover { border-color: var(--accent); }

    .project-name {
      font-weight: 600;
      font-size: 1.05rem;
      margin-bottom: 0.25rem;
    }

    .project-desc {
      color: var(--muted);
      font-size: 0.95rem;
    }

    .project-tag {
      display: inline-block;
      margin-top: 0.5rem;
      font-size: 0.75rem;
      font-weight: 500;
      color: var(--accent);
      background: color-mix(in srgb, var(--accent) 10%, transparent);
      padding: 0.15rem 0.5rem;
      border-radius: 99px;
    }

    .links {
      display: flex;
      gap: 1.5rem;
      flex-wrap: wrap;
    }

    .links a {
      color: var(--muted);
      text-decoration: none;
      font-size: 0.95rem;
      transition: color 0.15s;
    }

    .links a:hover { color: var(--accent); }

    @media (max-width: 480px) {
      body { padding: 2.5rem 1.25rem; }
      h1 { font-size: 1.6rem; }
    }
  </style>
</head>
<body>
  <main>
    <h1>Arth Gupta</h1>
    <p class="tagline"><a href="mailto:arthgupta2003@gmail.com" style="color: var(--muted); text-decoration: none; border-bottom: 1px solid var(--border);">arthgupta2003@gmail.com</a></p>

    <div class="bio">
    <p> Started vibe coding for fun and needed a place to publish :) </p>
    </div>

    <h2>Projects</h2>
    <div class="projects">
      <a class="project" href="https://calyx.arthgupta.dev">
        <div class="project-name">Calyx</div>
        <div class="project-desc">Group calendar that helps your crew find events and actually go together. Partiful meets Google Calendar.</div>
        <span class="project-tag">In progress</span>
      </a>
    </div>

    <h2>Find me</h2>
    <div class="links">
      <a href="https://github.com/arthgupta2003">GitHub</a>
      <a href="https://www.linkedin.com/in/arth-gupta/">LinkedIn</a>
      <a href="https://x.com/trulyoptimal">Twitter</a>
      <a href="https://arthg.substack.com">Substack</a>
    </div>
  </main>
</body>
</html>
